<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEMPUS - Soluções Financeiras Inteligentes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #fff; color: #333; }
        header { background: linear-gradient(135deg, #0f3a45 0%, #1a4d5c 100%); padding: 20px 0; color: white; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .logo { font-size: 24px; font-weight: bold; color: #20B2AA; }
        .hero { background: linear-gradient(135deg, #0f3a45 0%, #1a4d5c 100%); color: white; padding: 80px 20px; text-align: center; }
        .hero h1 { font-size: 48px; margin-bottom: 20px; }
        .btn { display: inline-block; padding: 15px 40px; background: #20B2AA; color: white; text-decoration: none; border-radius: 8px; border: none; cursor: pointer; }
        section { padding: 60px 20px; }
        section h2 { font-size: 36px; margin-bottom: 40px; text-align: center; color: #0f3a45; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        footer { background: #0f3a45; color: white; padding: 40px 20px; text-align: center; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">TEMPUS</div>
        </div>
    </header>
    <div class="hero">
        <h1>TEMPUS Soluções Financeiras Inteligentes</h1>
        <p>Transformando visões em realidade financeira</p>
        <button class="btn">Agendar Consulta</button>
    </div>
    <section>
        <div class="container">
            <h2>Bem-vindo à TEMPUS</h2>
            <p style="text-align: center; font-size: 18px;">Site em construção. Em breve com todas as funcionalidades!</p>
        </div>
    </section>
    <footer>
        <p>&copy; 2026 TEMPUS. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
